# Install: uv sync --group dev && uv run pre-commit install
# Run all hooks: uv run pre-commit run --all-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      # Lint (includes import sorting via rules I001, I002, ...)
      - id: ruff
        args: [--fix]
      # Format
      - id: ruff-format
